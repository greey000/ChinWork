name: Scrape Courses

on:
  schedule:
    - cron: "0 1 * * *"   # 每天 UTC 01:00（台灣時間早上 9 點）自動執行一次
  workflow_dispatch: {}    # 也可以到 GitHub 網頁的 Actions 分頁手動按「Run workflow」立即執行

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行抓取
        run: python scraper.py

      - name: 提交更新後的資料
        run: |
          git config user.name "course-radar-bot"
          git config user.email "actions@github.com"
          git add data/courses.json
          git diff --quiet --cached || git commit -m "自動更新課程資料 $(date -u +'%Y-%m-%d')"
          git push
